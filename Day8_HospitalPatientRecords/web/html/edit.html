<div class="form-container wide-form">
    <div class="form-header">
        <h2 class="form-title">Edit Patient Details</h2>
        <p class="form-subtitle">Patient ID is read-only. Update patient profile, doctor assignment, ward, and admission status flow.</p>
    </div>

    {{ERROR_MESSAGE}}

    <form action="edit" method="POST" class="custom-form" onsubmit="return validatePatientForm(this)">
        <input type="hidden" name="id" value="{{PATIENT_ID}}">
        <input type="hidden" name="admissionId" value="{{ADMISSION_ID}}">

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-key"></i> Patient ID</label>
                <input type="text" class="form-input read-only" value="#{{PATIENT_ID}}" readonly>
            </div>

            <div class="form-group">
                <label for="name" class="form-label"><i class="fa-solid fa-user"></i> Patient Name</label>
                <input type="text" id="name" name="name" class="form-input" value="{{PATIENT_NAME}}" required>
            </div>

            <div class="form-group">
                <label for="age" class="form-label"><i class="fa-solid fa-cake-candles"></i> Age</label>
                <input type="number" id="age" name="age" class="form-input" value="{{PATIENT_AGE}}" min="0" max="120" required>
            </div>

            <div class="form-group">
                <label for="gender" class="form-label"><i class="fa-solid fa-venus-mars"></i> Gender</label>
                <select id="gender" name="gender" class="form-select" required>
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <input type="hidden" id="genderCurrent" value="{{PATIENT_GENDER}}">
            </div>

            <div class="form-group">
                <label for="blood" class="form-label"><i class="fa-solid fa-droplet"></i> Blood Group</label>
                <select id="blood" name="blood" class="form-select" required>
                    <option value="">Select blood group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <input type="hidden" id="bloodCurrent" value="{{PATIENT_BLOOD}}">
            </div>

            <div class="form-group">
                <label for="phone" class="form-label"><i class="fa-solid fa-phone"></i> Phone</label>
                <input type="tel" id="phone" name="phone" class="form-input" value="{{PATIENT_PHONE}}" required>
            </div>

            <div class="form-group full-width">
                <label for="address" class="form-label"><i class="fa-solid fa-location-dot"></i> Address</label>
                <input type="text" id="address" name="address" class="form-input" value="{{PATIENT_ADDRESS}}" required>
            </div>

            <div class="form-group">
                <label for="doctorId" class="form-label"><i class="fa-solid fa-user-doctor"></i> Assign Doctor</label>
                <select id="doctorId" name="doctorId" class="form-select" required>
                    {{DOCTOR_OPTIONS}}
                </select>
            </div>

            <div class="form-group">
                <label for="ward" class="form-label"><i class="fa-solid fa-bed"></i> Ward</label>
                <input type="text" id="ward" name="ward" class="form-input" value="{{PATIENT_WARD}}" required>
            </div>

            <div class="form-group full-width">
                <label for="status" class="form-label"><i class="fa-solid fa-chart-simple"></i> Admission Status</label>
                <select id="status" name="status" class="form-select" required>
                    {{STATUS_OPTIONS}}
                </select>
            </div>

            <div class="form-group">
                <label for="appointmentAt" class="form-label"><i class="fa-solid fa-calendar-check"></i> Appointment Date & Time</label>
                <input type="datetime-local" id="appointmentAt" name="appointmentAt" class="form-input" value="{{APPOINTMENT_AT}}">
            </div>

            <div class="form-group">
                <label for="appointmentNotes" class="form-label"><i class="fa-solid fa-clipboard-list"></i> Appointment Notes</label>
                <input type="text" id="appointmentNotes" name="appointmentNotes" class="form-input" value="{{APPOINTMENT_NOTES}}" placeholder="Appointment notes">
            </div>
        </div>

        <div class="form-submit-panel">
            <a href="detail?id={{PATIENT_ID}}" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('nav-list').classList.add('active');
    selectCurrentOption('gender', 'genderCurrent');
    selectCurrentOption('blood', 'bloodCurrent');
</script>
